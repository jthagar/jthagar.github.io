{{ define "main" }}
<main id="main-content" class="page page--error">
  <div class="container container--narrow" style="padding: 4rem 1rem; text-align: center;">
    <h1 style="font-size: 2rem; font-weight: 500; margin-bottom: 0.75rem;">Page not found</h1>
    <p style="color: var(--color-on-surface-variant); margin-bottom: 2rem;">That URL does not exist on this site.</p>
    <a href="{{ "/" | relURL }}" class="main-btn">
      <span class="btn-text">Back home</span>
      <span class="btn-icon"><i class="fas fa-home" aria-hidden="true"></i></span>
    </a>
  </div>
</main>
{{ end }}
