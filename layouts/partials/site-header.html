<header class="site-header" id="site-header">
  <div class="site-header__inner container">
    <a class="site-logo md-ripple" href="#home">{{ site.Title }}</a>
    <nav class="site-nav" id="site-nav" aria-label="Primary">
      <a href="#home" class="site-nav__link is-active" data-nav="home">Home</a>
      <a href="#about" class="site-nav__link" data-nav="about">About</a>
      <a href="#portfolio" class="site-nav__link" data-nav="portfolio">Projects</a>
      <a href="#contact" class="site-nav__link" data-nav="contact">Contact</a>
    </nav>
    <div class="site-header__actions">
      <button type="button" id="theme-toggle" class="theme-toolbar-btn md-ripple" aria-label="Switch color theme" title="Theme">
        <span class="material-symbols-outlined" aria-hidden="true">light_mode</span>
      </button>
      <button type="button" id="nav-toggle" class="nav-menu-btn md-ripple" aria-label="Open menu" aria-expanded="false" aria-controls="site-nav">
        <span class="material-symbols-outlined nav-menu-btn__icon-open" aria-hidden="true">menu</span>
        <span class="material-symbols-outlined nav-menu-btn__icon-close" aria-hidden="true">close</span>
      </button>
    </div>
  </div>
</header>
